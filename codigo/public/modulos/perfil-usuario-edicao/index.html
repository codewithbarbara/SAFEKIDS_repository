<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Perfil | SafeKids</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;600;700&display=swap" rel="stylesheet">

    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

    <link rel="stylesheet" href="../viewpsi/css/styles.css">

    <style>
        body {
            background-color: #f8f9fa;
        }

        .nav-pills .nav-link.active,
        .nav-pills .show>.nav-link {
            background-color: var(--primary-color, #0d6efd);
            border-radius: 50px;
        }

        .nav-link {
            color: #555;
            font-weight: 600;
        }
    </style>
</head>

<body>

    <header>
        <div class="header-container">
            <div class="logo">
                <a href="../../index.html">
                    <img src="../../assets/images/logo.png" alt="Logo SafeKids">
                </a>
            </div>

            <div id="header-user-area" class="header-user-area">
            </div>
        </div>

        <div class="menudenavegacao">
            <nav>
                <ul>
                    <li><a href="../about/about.html">Sobre</a></li>
                    <li><a href="../view-all-psicologos/index.html">Psicólogos</a></li>
                    <li><a href="../apresentacao-de-artigos/index.html">Artigos</a></li>
                    <li><a href="../forum-conversa/forum.html">Fórum</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main class="container my-5">
        <h2 class="fw-bold text-primary mb-4 pb-2 border-bottom">
            <i class="fas fa-user-edit me-2"></i> Editar Meus Dados
        </h2>

        <div class="row">
            <div class="col-md-3 mb-4">
                <div class="card shadow-sm border-0">
                    <div class="card-body p-0">
                        <div class="nav flex-column nav-pills p-3" id="v-pills-tab" role="tablist"
                            aria-orientation="vertical">
                            <button class="nav-link active text-start mb-2" id="v-pills-dados-tab" data-bs-toggle="pill"
                                data-bs-target="#v-pills-dados" type="button" role="tab">
                                <i class="fas fa-id-card me-2"></i> Meus Dados
                            </button>
                        </div>
                    </div>
                </div>
            </div>

            <div class="col-md-9">
                <div class="tab-content" id="v-pills-tabContent">

                    <div class="tab-pane fade show active" id="v-pills-dados" role="tabpanel">
                        <div class="card shadow-sm border-0">
                            <div class="card-body p-4">
                                <h4 class="mb-4 text-secondary fw-bold">Informações Pessoais</h4>
                                <form id="formPerfilUsuario">

                                    <div class="mb-3">
                                        <label class="form-label fw-bold small text-uppercase text-muted">Nome
                                            Completo</label>
                                        <div class="input-group">
                                            <span class="input-group-text bg-light border-end-0"><i
                                                    class="fas fa-user text-muted"></i></span>
                                            <input type="text" class="form-control border-start-0 ps-0" id="inputNome"
                                                required>
                                        </div>
                                    </div>

                                    <div class="mb-3">
                                        <label class="form-label fw-bold small text-uppercase text-muted">Login</label>
                                        <div class="input-group">
                                            <span class="input-group-text bg-light border-end-0"><i
                                                    class="fas fa-sign-in-alt text-muted"></i></span>
                                            <input type="text" class="form-control border-start-0 ps-0 bg-light"
                                                id="inputLogin" readonly disabled title="O login não pode ser alterado">
                                        </div>
                                        <div class="form-text">O login é único e não pode ser alterado.</div>
                                    </div>

                                    <div class="mb-3">
                                        <label class="form-label fw-bold small text-uppercase text-muted">E-mail</label>
                                        <div class="input-group">
                                            <span class="input-group-text bg-light border-end-0"><i
                                                    class="fas fa-envelope text-muted"></i></span>
                                            <input type="email" class="form-control border-start-0 ps-0" id="inputEmail"
                                                required>
                                        </div>
                                    </div>

                                    <div class="mb-3">
                                        <label class="form-label fw-bold small text-uppercase text-muted">Foto de Perfil
                                            (URL)</label>
                                        <div class="input-group">
                                            <span class="input-group-text bg-light border-end-0"><i
                                                    class="fas fa-camera text-muted"></i></span>
                                            <input type="url" class="form-control border-start-0 ps-0" id="inputFoto"
                                                placeholder="https://...">
                                        </div>
                                    </div>

                                    <div class="text-end border-top pt-3 mt-4">
                                        <button type="submit" class="btn btn-primary rounded-pill px-4 fw-bold">
                                            Salvar Alterações
                                        </button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    </div>

                </div>
            </div>
        </div>
    </main>

    <div class="modal fade" id="modalSucessoUsuario" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0 shadow text-center p-4">
                <div class="modal-body">
                    <i class="fas fa-check-circle text-success mb-3" style="font-size: 3rem;"></i>
                    <h4 class="fw-bold text-secondary mb-2">Perfil Atualizado!</h4>
                    <p class="text-muted">Seus dados foram salvos com sucesso.</p>
                    <button type="button" class="btn btn-success rounded-pill px-4" data-bs-dismiss="modal">OK</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>
</body>

</html>
