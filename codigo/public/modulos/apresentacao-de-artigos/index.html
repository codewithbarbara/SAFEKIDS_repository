<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Artigos | SafeKids</title>

  <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <link rel="stylesheet" href="../viewpsi/css/styles.css">
  <link rel="stylesheet" href="css/style-index.css?v=4">
</head>

<body>

  <header>
    <div class="header-container">
      <div class="logo">
        <a href="../../index.html">
          <img src="../../assets/images/logo.png" alt="Logo SafeKids">
        </a>
      </div>

      <div id="header-user-area" class="header-user-area">
      </div>
    </div>

    <div class="menudenavegacao">
      <nav>
        <ul>
          <li><a href="../about/about.html">Sobre</a></li>
          <li><a href="../view-all-psicologos/index.html">Psicólogos</a></li>
          <li><a href="../apresentacao-de-artigos/index.html" class="active">Artigos</a></li>
          <li><a href="../forum-conversa/forum.html">Fórum</a></li>
        </ul>
      </nav>
    </div>
  </header>

  <main>
    <section class="titulo-pesquisa bg-white mb-0">
      <div class="container">
        <h1 class="display-4 fw-bold text-secondary mb-4">Artigos e Guias</h1>

        <div class="row justify-content-center w-100">
          <div class="col-md-8">
            <div class="input-group input-group-lg shadow-sm">
              <span class="input-group-text bg-white border-end-0">
                <i class="fas fa-search text-muted"></i>
              </span>
              <input type="text" id="pesquisa" class="form-control border-start-0" placeholder="Pesquisar artigo..."
                style="box-shadow: none;">
            </div>
          </div>
        </div>
      </div>
    </section>

    <div class="container pb-5">
      <div class="row mb-4 align-items-center">
        <div class="col-md-6 text-muted mb-3 mb-md-0">
          <span>Explore nosso conteúdo educativo</span>
        </div>
        <div class="col-md-6">
          <div class="d-flex justify-content-md-end gap-3 flex-wrap">
            <div class="d-flex align-items-center gap-2">
              <label for="ordenar" class="mb-0 fw-bold text-secondary text-nowrap"><small>Ordenar:</small></label>
              <select id="ordenar" class="form-select form-select-sm" style="width: auto; cursor: pointer;">
                <option value="titulo-asc">Título A–Z</option>
                <option value="titulo-desc">Título Z–A</option>
                <option value="data-desc" selected>Mais recentes</option>
                <option value="data-asc">Mais antigos</option>
              </select>
            </div>

            <div class="d-flex align-items-center gap-2">
              <label for="autor" class="mb-0 fw-bold text-secondary text-nowrap"><small>Autor:</small></label>
              <select id="autor" class="form-select form-select-sm" style="width: auto; cursor: pointer;">
                <option value="">Todos</option>
              </select>
            </div>
          </div>
        </div>
      </div>

      <div id="lista-artigos" class="row g-4">
      </div>
    </div>
  </main>

  <footer class="bg-light py-4 mt-auto border-top">
    <div class="container text-center text-muted">
      <small>© <span id="anoAtual"></span> SafeKids — Todos os direitos reservados.</small>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="./js/app-index.js"></script>
  <script>
    document.getElementById('anoAtual').textContent = new Date().getFullYear();
  </script>
</body>

</html>
