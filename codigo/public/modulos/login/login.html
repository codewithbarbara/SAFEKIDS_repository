<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - SafeKids</title>

  <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

  <link rel="stylesheet" href="login.css">
</head>

<body>
  <div class="login-container">
    <header class="login-header">
      <a href="../../index.html" class="logo-link">
        <img src="../../assets/images/logo.png" alt="SafeKids Logo" class="logo-img">
      </a>
    </header>

    <main class="login-card">
      <div class="card-header">
        <h2>Bem-vindo de volta!</h2>
        <p>Acesse sua conta para continuar</p>
      </div>

      <form id="login-form" class="login-form">
        <div class="form-group">
          <label for="username">Login ou Email</label>
          <div class="input-wrapper">
            <i class="fa-regular fa-user"></i>
            <input type="text" id="username" name="username" placeholder="Seu login ou email" required>
          </div>
        </div>

        <div class="form-group">
          <label for="password">Senha</label>
          <div class="input-wrapper">
            <i class="fa-solid fa-lock"></i>
            <input type="password" id="password" name="password" placeholder="Sua senha" required>
          </div>
        </div>

        <button type="submit" class="btn-login">Entrar</button>
      </form>

      <div class="card-footer">
        <p>Não tem conta? <a href="cadastro.html" class="link-cadastro">Cadastre-se</a></p>
      </div>
    </main>
  </div>

  <script src="../../assets/js/login.js"></script>
  <script>
    function processaFormLogin(event) {
      event.preventDefault();

      var username = document.getElementById('username').value;
      var password = document.getElementById('password').value;

      var resultadoLogin = loginUser(username, password);

      if (resultadoLogin) {
        sessionStorage.setItem('usuarioLogado', JSON.stringify(resultadoLogin));
        window.location.href = '../../index.html';
      } else {
        alert('Usuário ou senha incorretos');
      }
    }

    document.getElementById('login-form').addEventListener('submit', processaFormLogin);
  </script>
</body>

</html>
